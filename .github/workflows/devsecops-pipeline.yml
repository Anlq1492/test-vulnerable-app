name: DevSecOps Security Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ============================================
  # 1. SAST с использованием Semgrep
  # ============================================
  sast-scan:
    runs-on: ubuntu-latest
    name: SAST - Semgrep Security Scan
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Semgrep Security Scan
        run: |
          pip install semgrep
          semgrep scan \
            --config auto \
            --config p/security-audit \
            --json \
            --output semgrep-results.json \
            . || true
          
          echo "=== Semgrep Results Summary ==="
          if [ -f "semgrep-results.json" ]; then
            HIGH=$(jq '.results | map(select(.extra.severity == "ERROR")) | length' semgrep-results.json 2>/dev/null || echo 0)
            echo "Semgrep findings: High=$HIGH"
          fi
      
      - name: Upload Semgrep results to Defect Dojo
        env:
          DOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
          DOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          PRODUCT_NAME: ${{ secrets.DEFECTDOJO_PRODUCT_NAME }}
          ENGAGEMENT_ID: ${{ secrets.ENGAGEMENT_ID }}
        run: |
          if [ -f "semgrep-results.json" ]; then
            curl -X POST "$DOJO_URL/api/v2/import-scan/" \
              -H "Authorization: Token $DOJO_API_KEY" \
              -F "product_name=$PRODUCT_NAME" \
              -F "engagement=$ENGAGEMENT_ID" \
              -F "scan_type=Semgrep JSON Report" \
              -F "file=@semgrep-results.json"
            echo "✅ Semgrep results uploaded"
          fi
      
      - name: Save Semgrep results
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json

  # ============================================
  # 2. SCA - OWASP Dependency Check
  # ============================================
  sca-scan:
    runs-on: ubuntu-latest
    name: SCA - Dependency Check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'test-vulnerable-app'
          path: '.'
          format: 'JSON'
          out: 'reports'
      
      - name: Upload SCA results to Defect Dojo
        env:
          DOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
          DOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          PRODUCT_NAME: ${{ secrets.DEFECTDOJO_PRODUCT_NAME }}
          ENGAGEMENT_ID: ${{ secrets.ENGAGEMENT_ID }}
        run: |
          if [ -f "reports/dependency-check-report.json" ]; then
            curl -X POST "$DOJO_URL/api/v2/import-scan/" \
              -H "Authorization: Token $DOJO_API_KEY" \
              -F "product_name=$PRODUCT_NAME" \
              -F "engagement=$ENGAGEMENT_ID" \
              -F "scan_type=Dependency Check Scan" \
              -F "file=@reports/dependency-check-report.json"
            echo "✅ Dependency Check results uploaded"
          fi
      
      - name: Save SCA results
        uses: actions/upload-artifact@v4
        with:
          name: sca-results
          path: reports/dependency-check-report.json

  # ============================================
  # 3. DAST - OWASP ZAP (ИСПРАВЛЕННЫЙ)
  # ============================================
  dast-scan:
    runs-on: ubuntu-latest
    name: DAST - OWASP ZAP Scan
    needs: [sast-scan, sca-scan]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build and start vulnerable application
        run: |
          # Сборка образа
          docker build -t vulnerable-app .
          
          # Запуск контейнера с пробросом порта
          docker run -d \
            --name vulnerable-app \
            -p 5000:5000 \
            vulnerable-app
          
          # Ждем запуска приложения
          echo "Waiting for application to start..."
          for i in {1..30}; do
            sleep 2
            if curl -s -f http://localhost:5000 > /dev/null 2>&1; then
              echo "✅ Application is running on http://localhost:5000"
              break
            fi
            echo "Attempt $i/30: Application not ready, waiting..."
          done
          
          # Проверка, что приложение работает
          echo ""
          echo "=== Application Health Check ==="
          curl -v http://localhost:5000 2>&1 | head -20 || echo "Failed to connect"
          
          # Проверка всех эндпоинтов
          echo ""
          echo "=== Testing endpoints ==="
          curl -s http://localhost:5000/ && echo " - Root OK" || echo " - Root FAILED"
          curl -s "http://localhost:5000/user?name=test" && echo " - /user OK" || echo " - /user FAILED"
          curl -s "http://localhost:5000/welcome?name=test" && echo " - /welcome OK" || echo " - /welcome FAILED"
          curl -s "http://localhost:5000/ping?host=localhost" && echo " - /ping OK" || echo " - /ping FAILED"
          
          echo ""
          echo "=== Container status ==="
          docker ps
          docker logs vulnerable-app --tail 20
      
      - name: OWASP ZAP Baseline Scan
        run: |
          # Создаем директорию для результатов
          mkdir -p zap_results
          chmod 777 zap_results
          
          echo "Starting ZAP scan..."
          
          # Используем линк для доступа к контейнеру приложения
          docker run --rm \
            -v $(pwd)/zap_results:/zap/wrk:rw \
            --link vulnerable-app:vulnerable-app \
            --user root \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://vulnerable-app:5000 \
            -r zap_report.html \
            -J zap_results.json \
            -g zap.yaml \
            -j \
            -m 5 \
            -d || true
          
          echo ""
          echo "=== ZAP Scan Results ==="
          ls -la zap_results/
          
          # Проверяем результаты
          if [ -f "zap_results/zap_results.json" ]; then
            cp zap_results/zap_results.json .
            echo "✅ ZAP results file created!"
            echo "File size: $(wc -c < zap_results.json) bytes"
            
            # Выводим найденные уязвимости
            HIGH=$(jq '[.site[].alerts[]? | select(.riskcode == 3)] | length' zap_results.json 2>/dev/null || echo 0)
            MEDIUM=$(jq '[.site[].alerts[]? | select(.riskcode == 2)] | length' zap_results.json 2>/dev/null || echo 0)
            LOW=$(jq '[.site[].alerts[]? | select(.riskcode == 1)] | length' zap_results.json 2>/dev/null || echo 0)
            echo ""
            echo "=== ZAP Findings Summary ==="
            echo "High severity: $HIGH"
            echo "Medium severity: $MEDIUM"
            echo "Low severity: $LOW"
          else
            echo "⚠️ ZAP did not create results file"
            echo '{"site":[]}' > zap_results.json
          fi
      
      - name: Debug - Show ZAP results
        run: |
          echo "=== ZAP Results Content ==="
          if [ -f "zap_results.json" ]; then
            cat zap_results.json | jq '.site[].alerts[] | {risk: .risk, name: .name}' 2>/dev/null || echo "No alerts found"
          else
            echo "File not found"
          fi
      
      - name: Upload DAST results to Defect Dojo
        env:
          DOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
          DOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          PRODUCT_NAME: ${{ secrets.DEFECTDOJO_PRODUCT_NAME }}
          ENGAGEMENT_ID: ${{ secrets.ENGAGEMENT_ID }}
        run: |
          echo "=== Testing Defect Dojo Connection ==="
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" "$DOJO_URL/api/v2/products/" \
            -H "Authorization: Token $DOJO_API_KEY" \
            -H "Accept: application/json"
          
          echo ""
          echo "=== Uploading ZAP Results ==="
          if [ -f "zap_results.json" ] && [ -s "zap_results.json" ]; then
            # Проверяем, что файл не пустой и содержит данные
            if grep -q '"alerts":' zap_results.json || grep -q '"site":' zap_results.json; then
              RESPONSE=$(curl -s -w "\nHTTP Status: %{http_code}\n" -X POST "$DOJO_URL/api/v2/import-scan/" \
                -H "Authorization: Token $DOJO_API_KEY" \
                -F "product_name=$PRODUCT_NAME" \
                -F "engagement=$ENGAGEMENT_ID" \
                -F "scan_type=ZAP Scan" \
                -F "file=@zap_results.json")
              
              echo "$RESPONSE"
              
              if echo "$RESPONSE" | grep -q "201"; then
                echo "✅ ZAP results successfully uploaded to Defect Dojo!"
              else
                echo "❌ Upload failed with status: $(echo "$RESPONSE" | grep 'HTTP Status' | awk '{print $3}')"
              fi
            else
              echo "⚠️ ZAP results file is empty or invalid, skipping upload"
            fi
          else
            echo "❌ No valid zap_results.json to upload"
          fi
      
      - name: Save ZAP results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-results
          path: zap_results.json
          if-no-files-found: ignore
      
      - name: Stop application
        if: always()
        run: |
          docker stop vulnerable-app || true
          docker rm vulnerable-app || true

  # ============================================
  # 4. Security Gateway - Блокировка High/Critical
  # ============================================
  security-gate:
    runs-on: ubuntu-latest
    name: Security Gateway
    needs: [sast-scan, sca-scan, dast-scan]
    if: always()
    
    steps:
      - name: Download SAST results
        uses: actions/download-artifact@v4
        with:
          name: semgrep-results
          path: ./sast
        continue-on-error: true
      
      - name: Download SCA results
        uses: actions/download-artifact@v4
        with:
          name: sca-results
          path: ./sca
        continue-on-error: true
      
      - name: Download DAST results
        uses: actions/download-artifact@v4
        with:
          name: zap-results
          path: ./dast
        continue-on-error: true
      
      - name: Security Gate - Block on High/Critical vulnerabilities
        run: |
          echo "========================================="
          echo "🔒 SECURITY GATE - BLOCK ON HIGH/CRITICAL"
          echo "========================================="
          
          BLOCK=0
          VULN_REPORT=""
          
          # Проверка SAST (Semgrep)
          if [ -f "sast/semgrep-results.json" ]; then
            echo ""
            echo "📊 Checking SAST (Semgrep) results..."
            HIGH_SAST=$(jq '.results | map(select(.extra.severity == "ERROR")) | length' sast/semgrep-results.json 2>/dev/null || echo 0)
            echo "   SAST High severity findings: $HIGH_SAST"
            
            if [ "$HIGH_SAST" -gt 0 ]; then
              BLOCK=1
              VULN_REPORT="$VULN_REPORT\n   ❌ SAST (Semgrep): $HIGH_SAST High severity vulnerabilities"
            else
              VULN_REPORT="$VULN_REPORT\n   ✅ SAST (Semgrep): No High severity vulnerabilities"
            fi
          else
            echo "   ⚠️ No SAST results found"
          fi
          
          # Проверка SCA (Dependency Check)
          if [ -f "sca/dependency-check-report.json" ]; then
            echo ""
            echo "📊 Checking SCA (Dependency Check) results..."
            HIGH_SCA=$(jq '[.dependencies[]?.vulnerabilities[]? | select(.cvssv3?.baseScore >= 7.0)] | length' sca/dependency-check-report.json 2>/dev/null || echo 0)
            echo "   SCA High/Critical findings: $HIGH_SCA"
            
            if [ "$HIGH_SCA" -gt 0 ]; then
              BLOCK=1
              VULN_REPORT="$VULN_REPORT\n   ❌ SCA (Dependency Check): $HIGH_SCA High/Critical vulnerabilities"
            else
              VULN_REPORT="$VULN_REPORT\n   ✅ SCA (Dependency Check): No High/Critical vulnerabilities"
            fi
          else
            echo "   ⚠️ No SCA results found"
          fi
          
          # Проверка DAST (ZAP)
          if [ -f "dast/zap_results.json" ] && [ -s "dast/zap_results.json" ]; then
            echo ""
            echo "📊 Checking DAST (ZAP) results..."
            HIGH_DAST=$(jq '[.site[].alerts[]? | select(.riskcode == 3)] | length' dast/zap_results.json 2>/dev/null || echo 0)
            echo "   DAST High severity findings: $HIGH_DAST"
            
            if [ "$HIGH_DAST" -gt 0 ]; then
              BLOCK=1
              VULN_REPORT="$VULN_REPORT\n   ❌ DAST (ZAP): $HIGH_DAST High severity vulnerabilities"
            else
              VULN_REPORT="$VULN_REPORT\n   ✅ DAST (ZAP): No High severity vulnerabilities"
            fi
          else
            echo "   ⚠️ No DAST results found (DAST may have failed or found no issues)"
          fi
          
          echo ""
          echo "========================================="
          echo "SECURITY GATE DECISION"
          echo "========================================="
          echo -e "$VULN_REPORT"
          echo ""
          
          if [ "$BLOCK" -eq 1 ]; then
            echo "❌ SECURITY GATE FAILED: High/Critical vulnerabilities found!"
            echo "   Pull Request will be blocked."
            echo "   Please fix all High and Critical vulnerabilities before merging."
            exit 1
          else
            echo "✅ SECURITY GATE PASSED: No High/Critical vulnerabilities found!"
            echo "   Safe to merge."
            exit 0
          fi
