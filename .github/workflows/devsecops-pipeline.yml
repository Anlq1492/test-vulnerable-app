name: DevSecOps Security Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ============================================
  # 1. SAST с использованием Semgrep
  # ============================================
  sast-scan:
    runs-on: ubuntu-latest
    name: SAST - Semgrep Security Scan
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Semgrep Security Scan
        run: |
          pip install semgrep
          semgrep scan \
            --config auto \
            --config p/security-audit \
            --json \
            --output semgrep-results.json \
            . || true
          
          echo "=== Semgrep Results Summary ==="
          if [ -f "semgrep-results.json" ]; then
            HIGH=$(jq '.results | map(select(.extra.severity == "ERROR")) | length' semgrep-results.json 2>/dev/null || echo 0)
            echo "Semgrep findings: High=$HIGH"
          fi
      
      - name: Upload Semgrep results to Defect Dojo
        env:
          DOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
          DOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          PRODUCT_NAME: ${{ secrets.DEFECTDOJO_PRODUCT_NAME }}
          ENGAGEMENT_ID: ${{ secrets.ENGAGEMENT_ID }}
        run: |
          if [ -f "semgrep-results.json" ]; then
            curl -X POST "$DOJO_URL/api/v2/import-scan/" \
              -H "Authorization: Token $DOJO_API_KEY" \
              -F "product_name=$PRODUCT_NAME" \
              -F "engagement=$ENGAGEMENT_ID" \
              -F "scan_type=Semgrep JSON Report" \
              -F "file=@semgrep-results.json"
            echo "✅ Semgrep results uploaded"
          fi
      
      - name: Save Semgrep results
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json

  # ============================================
  # 2. SCA - OWASP Dependency Check
  # ============================================
  sca-scan:
    runs-on: ubuntu-latest
    name: SCA - Dependency Check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'test-vulnerable-app'
          path: '.'
          format: 'JSON'
          out: 'reports'
      
      - name: Upload SCA results to Defect Dojo
        env:
          DOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
          DOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          PRODUCT_NAME: ${{ secrets.DEFECTDOJO_PRODUCT_NAME }}
          ENGAGEMENT_ID: ${{ secrets.ENGAGEMENT_ID }}
        run: |
          if [ -f "reports/dependency-check-report.json" ]; then
            curl -X POST "$DOJO_URL/api/v2/import-scan/" \
              -H "Authorization: Token $DOJO_API_KEY" \
              -F "product_name=$PRODUCT_NAME" \
              -F "engagement=$ENGAGEMENT_ID" \
              -F "scan_type=Dependency Check" \
              -F "file=@reports/dependency-check-report.json"
            echo "✅ Dependency Check results uploaded"
          fi
      
      - name: Save SCA results
        uses: actions/upload-artifact@v4
        with:
          name: sca-results
          path: reports/dependency-check-report.json

  # ============================================
  # 3. DAST - OWASP ZAP (XML FORMAT)
  # ============================================
  dast-scan:
    runs-on: ubuntu-latest
    name: DAST - OWASP ZAP Scan
    needs: [sast-scan, sca-scan]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build and start vulnerable application
        run: |
          echo "Building Docker image..."
          docker build -t vulnerable-app .
          
          echo "Starting container..."
          docker run -d \
            --name vulnerable-app \
            -p 5000:5000 \
            vulnerable-app
          
          echo "Waiting for application to start..."
          for i in {1..15}; do
            sleep 2
            if curl -s -f http://localhost:5000 > /dev/null 2>&1; then
              echo "✅ Application is running on http://localhost:5000"
              break
            fi
            echo "Attempt $i/15: Application not ready..."
          done
          
          echo ""
          echo "=== Container logs ==="
          docker logs vulnerable-app 2>&1 | tail -10
          
          echo ""
          echo "=== Container status ==="
          docker ps -a
      
      - name: OWASP ZAP Baseline Scan (XML Output)
        run: |
          mkdir -p zap_results
          chmod 777 zap_results
          
          echo "Starting ZAP scan..."
          
          docker run --rm \
            -v $(pwd)/zap_results:/zap/wrk:rw \
            --network host \
            --user root \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:5000 \
            -r zap_report.html \
            -x zap_results.xml \
            -J zap_results.json \
            -j || true
          
          echo ""
          echo "=== ZAP Scan Results ==="
          ls -la zap_results/
          
          if [ -f "zap_results/zap_results.xml" ]; then
            cp zap_results/zap_results.xml .
            echo "✅ ZAP XML results file created!"
            echo "File size: $(wc -c < zap_results.xml) bytes"
            
            if [ -f "zap_results/zap_results.json" ]; then
              HIGH=$(jq '[.site[].alerts[]? | select(.riskcode == 3)] | length' zap_results/zap_results.json 2>/dev/null || echo 0)
              MEDIUM=$(jq '[.site[].alerts[]? | select(.riskcode == 2)] | length' zap_results/zap_results.json 2>/dev/null || echo 0)
              LOW=$(jq '[.site[].alerts[]? | select(.riskcode == 1)] | length' zap_results/zap_results.json 2>/dev/null || echo 0)
              echo ""
              echo "=== ZAP Findings Summary ==="
              echo "High severity: $HIGH"
              echo "Medium severity: $MEDIUM"
              echo "Low severity: $LOW"
            fi
          else
            echo "⚠️ ZAP did not create XML results file"
            echo '<?xml version="1.0" encoding="UTF-8"?><OWASPZAPReport version="2" generated=""></OWASPZAPReport>' > zap_results.xml
          fi
      
      - name: Upload DAST results to Defect Dojo
        env:
          DOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
          DOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          PRODUCT_NAME: ${{ secrets.DEFECTDOJO_PRODUCT_NAME }}
          ENGAGEMENT_ID: ${{ secrets.ENGAGEMENT_ID }}
        run: |
          echo "=== Testing Defect Dojo Connection ==="
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" "$DOJO_URL/api/v2/products/" \
            -H "Authorization: Token $DOJO_API_KEY" \
            -H "Accept: application/json"
          
          echo ""
          echo "=== Uploading ZAP Results ==="
          if [ -f "zap_results.xml" ] && [ -s "zap_results.xml" ]; then
            RESPONSE=$(curl -s -w "\nHTTP Status: %{http_code}\n" -X POST "$DOJO_URL/api/v2/import-scan/" \
              -H "Authorization: Token $DOJO_API_KEY" \
              -F "product_name=$PRODUCT_NAME" \
              -F "engagement=$ENGAGEMENT_ID" \
              -F "scan_type=ZAP Scan" \
              -F "file=@zap_results.xml")
            
            echo "$RESPONSE"
            
            if echo "$RESPONSE" | grep -q "201"; then
              echo "✅ ZAP results successfully uploaded to Defect Dojo!"
            else
              echo "❌ Upload failed"
            fi
          else
            echo "❌ No valid zap_results.xml to upload"
          fi
      
      - name: Save ZAP results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-results
          path: |
            zap_results.xml
            zap_results.json
          if-no-files-found: ignore
      
      - name: Stop application
        if: always()
        run: |
          docker stop vulnerable-app || true
          docker rm vulnerable-app || true

  # ============================================
  # 4. Security Gateway
  # ============================================
  security-gate:
    runs-on: ubuntu-latest
    name: Security Gateway
    needs: [sast-scan, sca-scan, dast-scan]
    if: always()
    
    steps:
      - name: Download SAST results
        uses: actions/download-artifact@v4
        with:
          name: semgrep-results
          path: ./sast
        continue-on-error: true
      
      - name: Download SCA results
        uses: actions/download-artifact@v4
        with:
          name: sca-results
          path: ./sca
        continue-on-error: true
      
      - name: Download DAST results
        uses: actions/download-artifact@v4
        with:
          name: zap-results
          path: ./dast
        continue-on-error: true
      
      - name: Security Gate - Block on High/Critical
        run: |
          echo "========================================="
          echo "🔒 SECURITY GATE - BLOCK ON HIGH/CRITICAL"
          echo "========================================="
          
          BLOCK=0
          VULN_REPORT=""
          
          # SAST
          if [ -f "sast/semgrep-results.json" ]; then
            echo ""
            echo "📊 Checking SAST results..."
            HIGH_SAST=$(jq '.results | map(select(.extra.severity == "ERROR")) | length' sast/semgrep-results.json 2>/dev/null || echo 0)
            echo "   SAST High severity: $HIGH_SAST"
            
            if [ "$HIGH_SAST" -gt 0 ]; then
              BLOCK=1
              VULN_REPORT="$VULN_REPORT\n   ❌ SAST: $HIGH_SAST High severity vulnerabilities"
            else
              VULN_REPORT="$VULN_REPORT\n   ✅ SAST: No High severity vulnerabilities"
            fi
          fi
          
          # SCA
          if [ -f "sca/dependency-check-report.json" ]; then
            echo ""
            echo "📊 Checking SCA results..."
            HIGH_SCA=$(jq '[.dependencies[]?.vulnerabilities[]? | select(.cvssv3?.baseScore >= 7.0)] | length' sca/dependency-check-report.json 2>/dev/null || echo 0)
            echo "   SCA High/Critical: $HIGH_SCA"
            
            if [ "$HIGH_SCA" -gt 0 ]; then
              BLOCK=1
              VULN_REPORT="$VULN_REPORT\n   ❌ SCA: $HIGH_SCA High/Critical vulnerabilities"
            else
              VULN_REPORT="$VULN_REPORT\n   ✅ SCA: No High/Critical vulnerabilities"
            fi
          fi
          
          # DAST
          if [ -f "dast/zap_results.xml" ] && [ -s "dast/zap_results.xml" ]; then
            echo ""
            echo "📊 Checking DAST results..."
            HIGH_DAST=$(grep -c 'riskcode="3"' dast/zap_results.xml 2>/dev/null || echo 0)
            echo "   DAST High severity: $HIGH_DAST"
            
            if [ "$HIGH_DAST" -gt 0 ]; then
              BLOCK=1
              VULN_REPORT="$VULN_REPORT\n   ❌ DAST: $HIGH_DAST High severity vulnerabilities"
            else
              VULN_REPORT="$VULN_REPORT\n   ✅ DAST: No High severity vulnerabilities"
            fi
          else
            echo "   ⚠️ No DAST results found"
          fi
          
          echo ""
          echo "========================================="
          echo "SECURITY GATE DECISION"
          echo "========================================="
          echo -e "$VULN_REPORT"
          echo ""
          
          if [ "$BLOCK" -eq 1 ]; then
            echo "❌ SECURITY GATE FAILED: High/Critical vulnerabilities found!"
            exit 1
          else
            echo "✅ SECURITY GATE PASSED: No High/Critical vulnerabilities found!"
            exit 0
          fi
