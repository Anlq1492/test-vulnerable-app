name: DevSecOps Security Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ============================================
  # 1. SAST с использованием Semgrep (мультиязычный)
  # ============================================
  sast-scan:
    runs-on: ubuntu-latest
    name: SAST - Semgrep Security Scan
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Semgrep Security Scan
        run: |
          # Установка Semgrep
          pip install semgrep
          
          # Запуск Semgrep с правилами сообщества
          semgrep scan \
            --config auto \
            --config p/security-audit \
            --json \
            --output semgrep-results.json \
            . || true
          
          # Вывод статистики
          echo "=== Semgrep Results Summary ==="
          if [ -f "semgrep-results.json" ]; then
            HIGH=$(jq '.results | map(select(.extra.severity == "ERROR")) | length' semgrep-results.json 2>/dev/null || echo 0)
            MEDIUM=$(jq '.results | map(select(.extra.severity == "WARNING")) | length' semgrep-results.json 2>/dev/null || echo 0)
            LOW=$(jq '.results | map(select(.extra.severity == "INFO")) | length' semgrep-results.json 2>/dev/null || echo 0)
            echo "Semgrep findings: High=$HIGH, Medium=$MEDIUM, Low=$LOW"
          fi
      
      - name: Upload Semgrep results to Defect Dojo
        env:
          DOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
          DOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          PRODUCT_NAME: ${{ secrets.DEFECTDOJO_PRODUCT_NAME }}
          ENGAGEMENT_ID: ${{ secrets.ENGAGEMENT_ID }}
        run: |
          if [ -f "semgrep-results.json" ]; then
            curl -X POST "$DOJO_URL/api/v2/import-scan/" \
              -H "Authorization: Token $DOJO_API_KEY" \
              -F "product_name=$PRODUCT_NAME" \
              -F "engagement=$ENGAGEMENT_ID" \
              -F "scan_type=Semgrep JSON" \
              -F "file=@semgrep-results.json"
            echo "✅ Semgrep results uploaded to Defect Dojo"
          else
            echo "⚠️ No Semgrep results file found"
          fi
      
      - name: Save Semgrep results for gate
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json

  # ============================================
  # 2. SCA - OWASP Dependency Check
  # ============================================
  sca-scan:
    runs-on: ubuntu-latest
    name: SCA - Dependency Check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'test-vulnerable-app'
          path: '.'
          format: 'JSON'
          out: 'reports'
      
      - name: Upload SCA results to Defect Dojo
        env:
          DOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
          DOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          PRODUCT_NAME: ${{ secrets.DEFECTDOJO_PRODUCT_NAME }}
          ENGAGEMENT_ID: ${{ secrets.ENGAGEMENT_ID }}
        run: |
          if [ -f "reports/dependency-check-report.json" ]; then
            curl -X POST "$DOJO_URL/api/v2/import-scan/" \
              -H "Authorization: Token $DOJO_API_KEY" \
              -F "product_name=$PRODUCT_NAME" \
              -F "engagement=$ENGAGEMENT_ID" \
              -F "scan_type=OWASP Dependency Check JSON" \
              -F "file=@reports/dependency-check-report.json"
            echo "✅ Dependency Check results uploaded to Defect Dojo"
          fi
      
      - name: Save SCA results for gate
        uses: actions/upload-artifact@v4
        with:
          name: sca-results
          path: reports/dependency-check-report.json

  # ============================================
  # 3. DAST - OWASP ZAP (требует запущенного приложения)
  # ============================================
  dast-scan:
    runs-on: ubuntu-latest
    name: DAST - OWASP ZAP Scan
    needs: [sast-scan, sca-scan]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build and start vulnerable application
        run: |
          # Сборка Docker образа
          docker build -t vulnerable-app .
          
          # Запуск контейнера
          docker run -d \
            --name vulnerable-app \
            -p 5000:5000 \
            -v /tmp:/tmp \
            vulnerable-app
          
          # Ожидание запуска приложения
          echo "Waiting for application to start..."
          for i in {1..30}; do
            if curl -s -f http://localhost:5000 > /dev/null 2>&1; then
              echo "✅ Application is running"
              break
            fi
            sleep 2
          done
          
          # Проверка, что приложение работает
          curl -s http://localhost:5000 || echo "⚠️ Application may not be fully ready"
      
      - name: OWASP ZAP Baseline Scan
        run: |
          # Базовое сканирование ZAP
          docker run --rm \
            -v $(pwd):/zap/wrk:rw \
            -u zap \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://host.docker.internal:5000 \
            -r zap_report.html \
            -J zap_results.json \
            -j || true
          
          # Проверка наличия результатов
          if [ -f "zap_results.json" ]; then
            echo "✅ ZAP scan completed"
            # Вывод статистики
            HIGH=$(jq '.site[].alerts | map(select(.riskcode == 3)) | length' zap_results.json 2>/dev/null || echo 0)
            MEDIUM=$(jq '.site[].alerts | map(select(.riskcode == 2)) | length' zap_results.json 2>/dev/null || echo 0)
            LOW=$(jq '.site[].alerts | map(select(.riskcode == 1)) | length' zap_results.json 2>/dev/null || echo 0)
            echo "ZAP findings: High=$HIGH, Medium=$MEDIUM, Low=$LOW"
          else
            echo "⚠️ ZAP did not produce results file"
          fi
      
      - name: Upload DAST results to Defect Dojo
        env:
          DOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
          DOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          PRODUCT_NAME: ${{ secrets.DEFECTDOJO_PRODUCT_NAME }}
          ENGAGEMENT_ID: ${{ secrets.ENGAGEMENT_ID }}
        run: |
          if [ -f "zap_results.json" ]; then
            curl -X POST "$DOJO_URL/api/v2/import-scan/" \
              -H "Authorization: Token $DOJO_API_KEY" \
              -F "product_name=$PRODUCT_NAME" \
              -F "engagement=$ENGAGEMENT_ID" \
              -F "scan_type=ZAP Scan" \
              -F "file=@zap_results.json"
            echo "✅ ZAP results uploaded to Defect Dojo"
          fi
      
      - name: Save ZAP results for gate
        uses: actions/upload-artifact@v4
        with:
          name: zap-results
          path: zap_results.json
      
      - name: Stop application
        if: always()
        run: |
          docker stop vulnerable-app || true
          docker rm vulnerable-app || true

  # ============================================
  # 4. Security Gateway - Блокировка при High/Critical уязвимостях
  # ============================================
  security-gate:
    runs-on: ubuntu-latest
    name: Security Gateway
    needs: [sast-scan, sca-scan, dast-scan]
    if: always()
    
    steps:
      - name: Download SAST results
        uses: actions/download-artifact@v4
        with:
          name: semgrep-results
          path: ./sast
        continue-on-error: true
      
      - name: Download SCA results
        uses: actions/download-artifact@v4
        with:
          name: sca-results
          path: ./sca
        continue-on-error: true
      
      - name: Download DAST results
        uses: actions/download-artifact@v4
        with:
          name: zap-results
          path: ./dast
        continue-on-error: true
      
      - name: Security Gate - Block on High/Critical vulnerabilities
        run: |
          echo "========================================="
          echo "🔒 SECURITY GATE - BLOCK ON HIGH/CRITICAL"
          echo "========================================="
          
          BLOCK=0
          VULN_REPORT=""
          
          # ==========================================
          # 1. Проверка SAST (Semgrep) результатов
          # ==========================================
          if [ -f "sast/semgrep-results.json" ]; then
            echo ""
            echo "📊 Checking SAST (Semgrep) results..."
            
            # Semgrep severity: ERROR = High, WARNING = Medium, INFO = Low
            HIGH_SAST=$(jq '.results | map(select(.extra.severity == "ERROR")) | length' sast/semgrep-results.json 2>/dev/null || echo 0)
            
            echo "   SAST High severity findings: $HIGH_SAST"
            
            if [ "$HIGH_SAST" -gt 0 ]; then
              BLOCK=1
              VULN_REPORT="$VULN_REPORT\n   ❌ SAST (Semgrep): $HIGH_SAST High severity vulnerabilities"
            else
              VULN_REPORT="$VULN_REPORT\n   ✅ SAST (Semgrep): No High severity vulnerabilities"
            fi
          else
            echo "   ⚠️ No SAST results found (skipping)"
          fi
          
          # ==========================================
          # 2. Проверка SCA (Dependency Check) результатов
          # ==========================================
          if [ -f "sca/dependency-check-report.json" ]; then
            echo ""
            echo "📊 Checking SCA (Dependency Check) results..."
            
            # CVSS 9.0-10.0 = Critical, 7.0-8.9 = High
            # Dependency Check использует CVSS score
            HIGH_SCA=$(jq '[.dependencies[]?.vulnerabilities[]? | select(.cvssv3?.baseScore >= 7.0)] | length' sca/dependency-check-report.json 2>/dev/null || echo 0)
            CRITICAL_SCA=$(jq '[.dependencies[]?.vulnerabilities[]? | select(.cvssv3?.baseScore >= 9.0)] | length' sca/dependency-check-report.json 2>/dev/null || echo 0)
            
            echo "   SCA High severity findings: $HIGH_SCA"
            echo "   SCA Critical severity findings: $CRITICAL_SCA"
            
            TOTAL_HIGH_SCA=$((HIGH_SCA + CRITICAL_SCA))
            
            if [ "$TOTAL_HIGH_SCA" -gt 0 ]; then
              BLOCK=1
              VULN_REPORT="$VULN_REPORT\n   ❌ SCA (Dependency Check): $TOTAL_HIGH_SCA High/Critical severity vulnerabilities"
            else
              VULN_REPORT="$VULN_REPORT\n   ✅ SCA (Dependency Check): No High/Critical severity vulnerabilities"
            fi
          else
            echo "   ⚠️ No SCA results found (skipping)"
          fi
          
          # ==========================================
          # 3. Проверка DAST (ZAP) результатов
          # ==========================================
          if [ -f "dast/zap_results.json" ]; then
            echo ""
            echo "📊 Checking DAST (ZAP) results..."
            
            # ZAP riskcode: 3 = High, 2 = Medium, 1 = Low, 0 = Info
            HIGH_DAST=$(jq '[.site[].alerts[]? | select(.riskcode == 3)] | length' dast/zap_results.json 2>/dev/null || echo 0)
            CRITICAL_DAST=$(jq '[.site[].alerts[]? | select(.riskcode == 3 and (.name | contains("SQL") or contains("Injection") or contains("RCE")))] | length' dast/zap_results.json 2>/dev/null || echo 0)
            
            echo "   DAST High severity findings: $HIGH_DAST"
            
            if [ "$HIGH_DAST" -gt 0 ]; then
              BLOCK=1
              VULN_REPORT="$VULN_REPORT\n   ❌ DAST (ZAP): $HIGH_DAST High severity vulnerabilities"
            else
              VULN_REPORT="$VULN_REPORT\n   ✅ DAST (ZAP): No High severity vulnerabilities"
            fi
          else
            echo "   ⚠️ No DAST results found (skipping)"
          fi
          
          # ==========================================
          # 4. Принятие решения
          # ==========================================
          echo ""
          echo "========================================="
          echo "SECURITY GATE DECISION"
          echo "========================================="
          echo -e "$VULN_REPORT"
          echo ""
          
          if [ "$BLOCK" -eq 1 ]; then
            echo "❌ SECURITY GATE FAILED: High/Critical vulnerabilities found!"
            echo "   Pull Request will be blocked."
            echo "   Please fix all High and Critical vulnerabilities before merging."
            exit 1
          else
            echo "✅ SECURITY GATE PASSED: No High/Critical vulnerabilities found!"
            echo "   Safe to merge."
            exit 0
          fi
